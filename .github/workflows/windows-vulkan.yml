name: Windows Vulkan build

on:
  push:
    branches: ["main"]
    paths:
      - ".github/workflows/windows-vulkan.yml"
      - "native-kernels/orbitquant-vulkan/**"
  pull_request:
    paths:
      - ".github/workflows/windows-vulkan.yml"
      - "native-kernels/orbitquant-vulkan/**"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: windows-vulkan-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  EXECUTORCH_COMMIT: a6d812a082df57898b8608f56c867140cc9da32c

jobs:
  build:
    name: MSVC Vulkan source build
    runs-on: windows-2025
    timeout-minutes: 90
    steps:
      - name: Check out OrbitQuant
        uses: actions/checkout@v7.0.0

      - name: Set up Python
        uses: actions/setup-python@v6.3.0
        with:
          python-version: "3.12"

      - name: Build the ExecuTorch and OrbitQuant Vulkan targets
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $PSNativeCommandUseErrorActionPreference = $true

          $executorch = Join-Path $env:RUNNER_TEMP "executorch"
          $executorchBuild = Join-Path $env:RUNNER_TEMP "executorch-build"
          $executorchInstall = Join-Path $env:RUNNER_TEMP "executorch-install"
          $orbitquantBuild = Join-Path $env:RUNNER_TEMP "orbitquant-vulkan-build"
          $python = Join-Path $env:pythonLocation "python.exe"

          git config --global core.symlinks true
          git clone --filter=blob:none --no-checkout `
            https://github.com/pytorch/executorch.git $executorch
          git -C $executorch fetch --depth=1 origin $env:EXECUTORCH_COMMIT
          git -C $executorch config core.symlinks true
          git -C $executorch checkout --detach $env:EXECUTORCH_COMMIT
          if ((git -C $executorch rev-parse HEAD) -ne $env:EXECUTORCH_COMMIT) {
            throw "ExecuTorch checkout does not match the pinned commit"
          }
          git -C $executorch submodule update --init `
            backends/vulkan/third-party/Vulkan-Headers `
            backends/vulkan/third-party/VulkanMemoryAllocator `
            backends/vulkan/third-party/volk
          git -C $executorch submodule update --init

          $env:PATH = `
            "$env:CONDA;$env:CONDA\Scripts;$env:CONDA\Library\bin;$env:PATH"
          Push-Location $executorch
          & .ci\scripts\setup-vulkan-windows-deps.ps1
          Pop-Location
          $glslc = (Get-Command glslc.exe -ErrorAction Stop).Source
          & $python -m pip install PyYAML==6.0.1

          $vswhere = `
            "${env:ProgramFiles(x86)}\Microsoft Visual Studio\Installer\vswhere.exe"
          $vsRoot = & $vswhere `
            -latest `
            -products * `
            -requires Microsoft.VisualStudio.Component.VC.Tools.x86.x64 `
            -property installationPath
          if (-not $vsRoot) {
            throw "MSVC x86_64 tools were not found"
          }
          $vsDevCmd = Join-Path $vsRoot "Common7\Tools\VsDevCmd.bat"
          $envDump = cmd.exe /d /s /c `
            "call `"$vsDevCmd`" -arch=x64 -host_arch=x64 >nul && set"
          foreach ($line in $envDump) {
            $parts = $line -split "=", 2
            if ($parts.Length -eq 2) {
              Set-Item -Path "Env:$($parts[0])" -Value $parts[1]
            }
          }
          Get-Command cl.exe -ErrorAction Stop | Format-List Source
          & $glslc --version
          cmake --version

          cmake -S $executorch -B $executorchBuild `
            -G "Visual Studio 17 2022" -A x64 `
            -DCMAKE_BUILD_TYPE=Release `
            "-DCMAKE_INSTALL_PREFIX=$executorchInstall" `
            "-DPYTHON_EXECUTABLE=$python" `
            -DEXECUTORCH_BUILD_VULKAN=ON `
            -DEXECUTORCH_BUILD_PORTABLE_OPS=ON `
            -DEXECUTORCH_BUILD_EXECUTOR_RUNNER=OFF `
            -DEXECUTORCH_BUILD_TESTS=OFF `
            -DEXECUTORCH_BUILD_PYBIND=OFF `
            -DEXECUTORCH_BUILD_XNNPACK=OFF `
            "-DGLSLC_PATH=$glslc"
          cmake --build $executorchBuild --config Release `
            --target install --parallel 4

          cmake -S native-kernels\orbitquant-vulkan -B $orbitquantBuild `
            -G "Visual Studio 17 2022" -A x64 `
            -DCMAKE_BUILD_TYPE=Release `
            "-DCMAKE_PREFIX_PATH=$executorchInstall" `
            "-DPYTHON_EXECUTABLE=$python" `
            "-DORBITQUANT_EXECUTORCH_ROOT=$executorch" `
            "-DGLSLC_PATH=$glslc" `
            -DORBITQUANT_VULKAN_BUILD_TESTS=ON `
            -DORBITQUANT_VULKAN_BUILD_PTE_RUNNER=ON
          cmake --build $orbitquantBuild --config Release `
            --target orbitquant_vulkan_test orbitquant_vulkan_pte_runner `
            --parallel 4

          Get-Item `
            "$orbitquantBuild\Release\orbitquant_vulkan_test.exe", `
            "$orbitquantBuild\Release\orbitquant_vulkan_pte_runner.exe"
