name: CI

on:
  push:
    branches: ["main", "orbitquant-mvp"]
  pull_request:

jobs:
  cpu-tests:
    name: CPU tests
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v7.0.0

      - name: Set up Python
        uses: actions/setup-python@v6.3.0
        with:
          python-version: "3.12"

      - name: Set up uv
        uses: astral-sh/setup-uv@v8.3.0

      - name: Install dependencies
        run: uv sync --extra dev --extra hf --extra eval

      - name: Lint
        run: uv run ruff check .

      - name: HF integration tests
        shell: bash
        run: |
          uv run python -c "import diffusers, transformers"
          uv run pytest \
            tests/test_diffusers_modelmixin_integration.py \
            tests/test_transformers_pretrained_integration.py \
            tests/test_quantizer_adapter.py

      - name: Test
        run: uv run pytest

      - name: Build package
        run: uv build

      - name: Smoke test wheel
        shell: bash
        run: |
          tmpdir="$(mktemp -d)"
          uv venv "$tmpdir/.venv"
          uv pip install --python "$tmpdir/.venv/bin/python" dist/orbitquant-0.1.0-py3-none-any.whl
          source "$tmpdir/.venv/bin/activate"
          "$tmpdir/.venv/bin/python" -c "import orbitquant; print(orbitquant.__version__)"
          orbitquant --version
