name: CI

on:
  push:
    branches: ["main", "orbitquant-mvp"]
  pull_request:

jobs:
  cpu-tests:
    name: CPU tests
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up uv
        uses: astral-sh/setup-uv@v5

      - name: Install dependencies
        run: uv sync --extra dev --extra hf --extra eval

      - name: Lint
        run: uv run ruff check .

      - name: Test
        run: uv run pytest
