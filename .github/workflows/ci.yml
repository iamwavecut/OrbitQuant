name: CI

on:
  push:
    branches: ["main"]
  pull_request:

jobs:
  cpu-tests:
    name: CPU tests
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v7.0.0

      - name: Set up Python
        uses: actions/setup-python@v6.3.0
        with:
          python-version: "3.12"

      - name: Set up uv
        uses: astral-sh/setup-uv@v8.3.0

      - name: Install dependencies
        run: uv sync --extra dev --extra hf --extra eval

      - name: Lint
        run: uv run ruff check .

      - name: HF integration tests
        shell: bash
        run: |
          scripts/run_hf_compat_checks.sh --mode current

      - name: Test
        run: uv run pytest

      - name: Build package
        run: uv run --with build python -m build

      - name: Check package metadata
        run: uv run --with twine python -m twine check dist/*

      - name: Smoke test wheel
        shell: bash
        run: |
          tmpdir="$(mktemp -d)"
          uv venv "$tmpdir/.venv"
          uv pip install --python "$tmpdir/.venv/bin/python" dist/*.whl
          source "$tmpdir/.venv/bin/activate"
          "$tmpdir/.venv/bin/python" -c "import orbitquant; print(orbitquant.__version__)"
          orbitquant --version
